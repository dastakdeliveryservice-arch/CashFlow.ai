<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASHFLOW GLOBAL | STABLE ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js" defer></script>
    <style>
        /* Optimized Animations */
        .app-page { display: none; position: fixed; inset: 0; background: #070b12; z-index: 9000; }
        .active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Prevent layout thrashing */
        body { contain: content; }
    </style>
</head>
<body>

    <div id="main-container">
        </div>

    <script>
        // Use a single instance for Firebase to prevent memory leaks
        const firebaseConfig = { databaseURL: "https://cashflow-fa937-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const StateManager = {
            data: {},
            listeners: [],
            update(key, value) {
                this.data[key] = value;
                this.notify();
            },
            notify() {
                this.listeners.forEach(fn => requestAnimationFrame(fn));
            }
        };

        // UI Engine - Avoids re-rendering the whole page
        function renderUI(templateID) {
            requestAnimationFrame(() => {
                const container = document.getElementById('main-container');
                const template = document.getElementById(templateID);
                container.innerHTML = template.innerHTML;
            });
        }

        // Error Handling: Global catching to prevent freeze
        window.onerror = function(msg, url, line) {
            console.error("Engine Error: ", msg);
            return false;
        };

        // Efficient Data Fetching (Debounced)
        let debounceTimer;
        function stableFetch(path, callback) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                firebase.database().ref(path).on('value', (snap) => {
                    requestAnimationFrame(() => callback(snap.val()));
                });
            }, 300);
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Terminal Stable: Online");
            // App logic here
        });
    </script>
</body>
</html>
