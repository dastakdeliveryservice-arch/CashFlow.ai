<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow - inDrive Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* inDrive Style Variables */
        :root { --in-green: #b2ff05; --in-dark: #222222; --in-gray: #f4f4f4; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; color: #222222; overflow: hidden; margin: 0; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: relative; }
        .active-screen { display: flex; }
        
        /* Full Screen Maps */
        .map-container { flex-grow: 1; z-index: 10; height: 100%; width: 100%; }
        .leaflet-bottom, .leaflet-control-zoom { display: none; } /* Hide watermarks */

        /* inDrive UI Components */
        .card-bottom { position: absolute; bottom: 0; left: 0; width: 100%; background: white; border-top-left-radius: 24px; border-top-right-radius: 24px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 1000; padding: 24px; transition: transform 0.3s; }
        .btn-main { background-color: var(--in-green); color: black; font-weight: 800; border-radius: 16px; transition: 0.2s; padding: 16px; width: 100%; font-size: 1.1rem; text-align: center; border: none; cursor: pointer; }
        .btn-main:active { transform: scale(0.97); }
        .input-in { background: var(--in-gray); border: none; border-radius: 12px; padding: 16px; font-size: 1rem; font-weight: 600; width: 100%; outline: none; }
        .input-in:focus { box-shadow: inset 0 0 0 2px var(--in-green); }

        /* Real Laser Animation (inDrive style) */
        .laser-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999; display: none; pointer-events: none; }
        .sonar-wave { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 3px solid var(--in-green); animation: sonar 2s linear infinite; opacity: 0; }
        .sonar-wave:nth-child(2) { animation-delay: 0.6s; }
        .sonar-wave:nth-child(3) { animation-delay: 1.2s; }
        @keyframes sonar { 0% { width: 20px; height: 20px; opacity: 1; border-width: 4px; } 100% { width: 300px; height: 300px; opacity: 0; border-width: 1px; } }

        /* Floating Back Button */
        .floating-top { position: absolute; top: 20px; left: 20px; z-index: 1000; background: white; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active-screen justify-center items-center bg-white p-6">
        <h1 class="text-4xl font-extrabold mb-2" style="color: var(--in-dark);">CashFlow</h1>
        <p class="text-gray-500 mb-10 font-medium">Real-Time Cash Exchange</p>
        
        <div class="w-full space-y-4">
            <button onclick="loginAs('user')" class="btn-main shadow-lg">Login as User (Need Cash)</button>
            <button onclick="loginAs('agent')" class="btn-main" style="background-color: var(--in-dark); color: white;">Login as Agent (Give Cash)</button>
        </div>
    </div>

    <div id="main-dash" class="screen">
        <div class="floating-top" onclick="nav('start-screen')"><i class="fas fa-arrow-left"></i></div>
        
        <div id="live-map" class="map-container"></div>

        <div id="laser-effect" class="laser-container">
            <div class="sonar-wave"></div><div class="sonar-wave"></div><div class="sonar-wave"></div>
        </div>

        <div id="user-controls" class="card-bottom hidden">
            <h2 class="text-2xl font-bold mb-4">Request Cash</h2>
            <div class="flex space-x-3 mb-4">
                <input type="number" id="cash-amount" placeholder="Amount (Rs)" class="input-in w-2/3">
                <input type="number" id="cash-fee" placeholder="Fee (Rs)" class="input-in w-1/3">
            </div>
            <button id="request-btn" onclick="sendRealRequest()" class="btn-main shadow-lg">Request a Partner</button>
        </div>

        <div id="agent-controls" class="card-bottom hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Online Radar</h2>
                <div class="w-4 h-4 rounded-full bg-green-500 animate-pulse"></div>
            </div>
            <p class="text-gray-500 mb-4 text-sm">Searching for nearby cash requests...</p>
            <div id="incoming-requests" class="space-y-3 max-h-40 overflow-y-auto">
                <p class="text-center text-gray-400 italic text-sm">No active requests yet</p>
            </div>
        </div>
    </div>

    <div id="deal-screen" class="screen">
        <div class="p-4 bg-white shadow-md z-[1000] flex justify-between items-center">
            <h2 class="font-bold text-lg">Partner En-route</h2>
            <span class="bg-gray-200 px-3 py-1 rounded-full text-sm font-bold" id="distance-display">Calculating...</span>
        </div>
        <div id="deal-map" class="map-container"></div>
        <div class="card-bottom pb-8">
            <p class="text-gray-500 text-sm mb-2">Deal Info</p>
            <h3 class="text-2xl font-bold mb-4">Rs <span id="deal-amount">0</span> <span class="text-sm font-normal text-gray-400">+ Fee</span></h3>
            <button class="btn-main" onclick="alert('OTP implementation goes here!')">Complete Deal</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛑 FIREBASE CONFIGURATION (Zaroori Hai!)
        // 2 Mobiles ko jodne ke liye yahan apne Firebase details daalein.
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Agar Firebase config proper nahi hai, toh local mode par chalayenge taake error na aaye
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("Firebase Connected Real-Time!");
        } catch (error) {
            console.log("Running without Firebase. 2 Phones connection won't work until config is added.");
        }

        // ==========================================
        // VARIABLES & SETUP
        // ==========================================
        let currentRole = '';
        let myId = 'user_' + Math.floor(Math.random() * 10000); // Random ID
        let myLocation = { lat: 30.1978, lng: 71.4697 }; // Default Multan
        let map, dealMap, myMarker, partnerMarker;
        let watchId; // For continuous GPS tracking

        // Icons
        const userIcon = L.divIcon({ className: 'custom-icon', html: "<div style='background:black; width:16px; height:16px; border-radius:50%; border:3px solid #b2ff05; box-shadow:0 0 10px rgba(0,0,0,0.3);'></div>", iconSize: [16,16] });
        const agentIcon = L.divIcon({ className: 'custom-icon', html: "<div style='background:#b2ff05; width:16px; height:16px; border-radius:50%; border:3px solid black; box-shadow:0 0 10px rgba(0,0,0,0.3);'></div>", iconSize: [16,16] });

        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        // ==========================================
        // REAL-TIME GPS TRACKING
        // ==========================================
        function startTrackingLocation() {
            if ("geolocation" in navigator) {
                watchId = navigator.geolocation.watchPosition((position) => {
                    myLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                    
                    if (map) {
                        if(!myMarker) {
                            myMarker = L.marker([myLocation.lat, myLocation.lng], {icon: currentRole === 'user' ? userIcon : agentIcon}).addTo(map);
                            map.setView([myLocation.lat, myLocation.lng], 16);
                        } else {
                            myMarker.setLatLng([myLocation.lat, myLocation.lng]);
                        }
                    }

                    // Update location to Database for exact tracking
                    if(db) db.ref('users/' + myId).set({ location: myLocation, role: currentRole });

                }, (error) => {
                    console.log("GPS Error: ", error.message);
                }, { enableHighAccuracy: true, maximumAge: 0 }); // High accuracy for "exact location"
            } else {
                alert("GPS not supported on this browser.");
            }
        }

        // ==========================================
        // LOGIN & MAP INIT
        // ==========================================
        function loginAs(role) {
            currentRole = role;
            nav('main-dash');
            
            // UI Toggles
            document.getElementById('user-controls').classList.toggle('hidden', role !== 'user');
            document.getElementById('agent-controls').classList.toggle('hidden', role !== 'agent');

            // Init Map (inDrive style light theme)
            setTimeout(() => {
                if(!map) {
                    map = L.map('live-map', { zoomControl: false }).setView([myLocation.lat, myLocation.lng], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
                }
                map.invalidateSize();
                startTrackingLocation();

                // If agent, listen for real requests
                if(role === 'agent' && db) listenForRequests();
            }, 300);
        }

        // ==========================================
        // USER: SEND REAL REQUEST & LASER
        // ==========================================
        function sendRealRequest() {
            let amt = document.getElementById('cash-amount').value;
            let fee = document.getElementById('cash-fee').value;
            if(!amt || !fee) return alert("Enter amount and fee!");

            let btn = document.getElementById('request-btn');
            btn.innerText = "Scanning Area...";
            btn.style.backgroundColor = "white";
            btn.style.border = "2px solid var(--in-green)";
            
            // Turn ON inDrive Laser Animation
            document.getElementById('laser-effect').style.display = 'block';

            let requestData = {
                userId: myId,
                amount: amt,
                fee: fee,
                location: myLocation,
                status: 'pending'
            };

            if(db) {
                // Send to Firebase
                db.ref('requests/' + myId).set(requestData);
                
                // Listen for Agent Acceptance
                db.ref('requests/' + myId).on('value', (snap) => {
                    let req = snap.val();
                    if(req && req.status === 'accepted') {
                        document.getElementById('laser-effect').style.display = 'none';
                        startDealScreen(req);
                    }
                });
            } else {
                // Fake simulation if no Firebase
                setTimeout(() => {
                    document.getElementById('laser-effect').style.display = 'none';
                    startDealScreen({ amount: amt, agentId: 'dummy_agent' });
                }, 4000);
            }
        }

        // ==========================================
        // AGENT: RECEIVE REQUESTS
        // ==========================================
        function listenForRequests() {
            db.ref('requests').on('value', (snapshot) => {
                let reqDiv = document.getElementById('incoming-requests');
                reqDiv.innerHTML = ''; // Clear list
                let requests = snapshot.val();
                let found = false;

                for (let reqId in requests) {
                    let req = requests[reqId];
                    if (req.status === 'pending') {
                        found = true;
                        // Calculate dummy distance for UI
                        let uiCard = `
                            <div class="bg-gray-100 p-4 rounded-xl border-l-4 border-[#b2ff05] flex justify-between items-center">
                                <div>
                                    <p class="font-bold text-lg">Rs ${req.amount}</p>
                                    <p class="text-sm text-gray-500">Fee: Rs ${req.fee}</p>
                                </div>
                                <button onclick="acceptRequest('${reqId}')" class="bg-black text-white px-4 py-2 rounded-lg font-bold">Accept</button>
                            </div>
                        `;
                        reqDiv.innerHTML += uiCard;
                    }
                }
                if(!found) reqDiv.innerHTML = '<p class="text-center text-gray-400 italic text-sm">No active requests yet</p>';
            });
        }

        function acceptRequest(reqId) {
            if(db) {
                // Update database that agent accepted
                db.ref('requests/' + reqId).update({ status: 'accepted', agentId: myId });
                // Fetch deal details to start deal screen
                db.ref('requests/' + reqId).once('value').then(snap => {
                    startDealScreen(snap.val());
                });
            }
        }

        // ==========================================
        // EXACT LOCATION DEAL SCREEN
        // ==========================================
        function startDealScreen(dealData) {
            nav('deal-screen');
            document.getElementById('deal-amount').innerText = dealData.amount;

            setTimeout(() => {
                if(!dealMap) {
                    dealMap = L.map('deal-map', { zoomControl: false }).setView([myLocation.lat, myLocation.lng], 16);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(dealMap);
                }
                dealMap.invalidateSize();

                // Plot myself
                let meMarker = L.marker([myLocation.lat, myLocation.lng], {icon: currentRole === 'user' ? userIcon : agentIcon}).addTo(dealMap);
                
                // Track Partner Exactly Real-Time
                let partnerId = currentRole === 'user' ? dealData.agentId : dealData.userId;
                if(db && partnerId) {
                    db.ref('users/' + partnerId + '/location').on('value', (snap) => {
                        let pLoc = snap.val();
                        if(pLoc) {
                            if(!partnerMarker) {
                                partnerMarker = L.marker([pLoc.lat, pLoc.lng], {icon: currentRole === 'user' ? agentIcon : userIcon}).addTo(dealMap);
                            } else {
                                partnerMarker.setLatLng([pLoc.lat, pLoc.lng]);
                            }
                            
                            // Adjust map to show both markers
                            let group = new L.featureGroup([meMarker, partnerMarker]);
                            dealMap.fitBounds(group.getBounds(), {padding: [50, 50]});
                        }
                    });
                }
            }, 300);
        }
    </script>
</body>
</html>
