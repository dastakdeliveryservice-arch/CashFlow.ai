<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASHFLOW - AMIR CONFIG v14.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070b12; color: #f8fafc; overflow: hidden; margin: 0; }
        #map { width: 100%; height: 44vh; background: #0f172a; z-index: 10; border-bottom: 2px solid #1e293b; }
        .app-bottom-sheet { background: #0d1527; border-top: 2px solid #3b82f6; box-shadow: 0 -15px 50px rgba(0,0,0,0.6); border-radius: 36px 36px 0 0; height: 56vh; position: relative; z-index: 100; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .input-field-core { width: 100%; padding: 12px 16px; border-radius: 14px; background: #15223e; border: 1px solid #223863; color: #f8fafc; font-weight: 600; outline: none; margin-bottom: 10px; text-align: center; }
        .btn-action-master { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #ffffff; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; }
        .btn-action-master:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div id="authStagePanel" class="fixed inset-0 bg-[#070b12] z-[9500] flex flex-col justify-center px-8 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter text-slate-100 mb-2">CASH<span class="text-blue-500">FLOW.</span></h1>
        <p class="text-slate-500 text-[10px] font-black tracking-widest uppercase mb-10">FIXED AMIR ENGINE v14.5</p>
        <input id="inputAuthName" placeholder="Enter Operator Call Sign / Name" class="input-field-core">
        <button onclick="processQuickGateAuth()" class="btn-action-master w-full p-4 rounded-xl text-white font-bold text-sm shadow-xl">Secure Gateway Boot</button>
    </div>

    <div id="roleSelectorStagePanel" class="hidden fixed inset-0 bg-[#070b12] z-[9000] flex flex-col justify-center px-8 text-center">
        <h2 class="text-3xl font-black text-slate-100 mb-6 italic">Select Operational Node</h2>
        <div class="space-y-3">
            <button onclick="selectCoreRole('user')" class="w-full p-5 bg-slate-900 border border-slate-800 rounded-xl font-black flex items-center justify-between text-blue-400"><span><i class="fa-solid fa-user-tie mr-4 text-xl"></i>USER TERMINAL</span><i class="fa-solid fa-chevron-right text-slate-700"></i></button>
            <button onclick="selectCoreRole('agent')" class="w-full p-5 bg-slate-900 border border-slate-800 rounded-xl font-black flex items-center justify-between text-amber-500"><span><i class="fa-solid fa-shield mr-4 text-xl"></i>AGENT RADAR</span><i class="fa-solid fa-chevron-right text-slate-700"></i></button>
        </div>
    </div>

    <div id="mainApplicationAppFrame" class="hidden h-screen flex flex-col">
        <div class="flex-1 flex flex-col relative">
            <div id="map"></div>
            <button onclick="localStorage.clear(); location.reload();" class="absolute top-4 right-4 bg-red-950/80 border border-red-900 text-red-400 text-xs font-black px-3 py-2 rounded-xl z-[500] shadow-2xl">RESET NODE</button>

            <div class="app-bottom-sheet">
                <div class="flex-1 overflow-y-auto w-full">
                    
                    <div id="panelUserDashboard" class="hidden space-y-4">
                        <div id="userHomeMenuLayout" class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="triggerUserForm('Cash Required')" class="p-5 bg-slate-900 rounded-2xl border border-slate-800 text-center"><i class="fa-solid fa-sack-dollar text-blue-500 text-3xl mb-2 block"></i><p class="text-[10px] font-black">NEED CASH</p></button>
                            <button onclick="triggerUserForm('Cash Available')" class="p-5 bg-slate-900 rounded-2xl border border-slate-800 text-center"><i class="fa-solid fa-money-bill-transfer text-amber-500 text-3xl mb-2 block"></i><p class="text-[10px] font-black">PROVIDE CASH</p></button>
                        </div>

                        <div id="userRequestSetupInputs" class="hidden space-y-2">
                            <input id="inputAmtValue" type="number" placeholder="Amount (PKR)" class="input-field-core">
                            <input id="inputTipValue" type="number" placeholder="Commission (PKR)" class="input-field-core">
                            <button onclick="broadcastSignalToNetwork()" class="btn-action-master w-full p-4 rounded-xl text-xs font-black">LAUNCH LIVE SIGNAL</button>
                        </div>

                        <div id="userBiddingMonitorRadarRoom" class="hidden space-y-3 bg-slate-900 p-4 rounded-2xl border border-slate-800">
                            <div class="flex justify-between items-center text-[10px] font-bold">
                                <span class="text-emerald-400 animate-pulse"><i class="fa-solid fa-satellite-dish"></i> Transmitting Signal to Multan...</span>
                                <span onclick="killActiveSignal()" class="text-red-500 font-black cursor-pointer bg-red-950 px-2 py-0.5 rounded">CANCEL</span>
                            </div>
                            <div id="userLiveIncomingBidsFeed" class="space-y-2 pt-2"></div>
                        </div>
                    </div>

                    <div id="panelAgentDashboard" class="hidden space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                            <span class="text-[10px] font-black tracking-widest text-amber-500"><i class="fa-solid fa-circle-radiation mr-1"></i> MULTAN RADAR ACTIVE</span>
                            <span class="text-[9px] bg-emerald-950 text-emerald-400 px-3 py-1 rounded-full border border-emerald-800 font-black">LIVE STREAM</span>
                        </div>
                        <div id="agentRadarStreamContainer" class="space-y-3 pt-1"></div>
                    </div>

                    <div id="secureTransitNodeEndpointTerminal" class="hidden space-y-3">
                        <div class="bg-slate-950 p-3 rounded-2xl border border-slate-900 h-[130px] overflow-y-auto flex flex-col gap-2 text-xs" id="chatLogger"></div>
                        <div class="flex gap-2">
                            <input id="chatInput" placeholder="Type direct text message..." class="input-field-core !mb-0 text-left !p-3 !text-xs">
                            <button onclick="sendMsg()" class="bg-blue-600 text-white px-5 rounded-xl text-xs"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                        <div id="otpBox" class="bg-blue-950/60 p-3 rounded-2xl border border-blue-800/60 text-center text-xs font-bold text-blue-400">Settlement Key Token: <span id="otpVal" class="font-black text-2xl ml-2 tracking-widest block mt-1">----</span></div>
                        <div id="agentOtpBox" class="hidden flex gap-2"><input id="agentOtpInput" placeholder="ENTER 4-DIGIT SECURE CODE" class="input-field-core !mb-0 text-center tracking-widest font-black"><button onclick="verifyKeySettle()" class="bg-blue-600 font-black px-5 rounded-xl text-xs text-white">SETTLE</button></div>
                    </div>

                </div>

                <div class="mt-2 pt-2 border-t border-slate-800/80 bg-black/40 p-2 rounded-xl">
                    <div id="sysLog" class="text-[10px] font-mono font-bold text-emerald-400">System Ready.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // EXACT DATABASE REPLACEMENT FROM SCREENSHOT
        const firebaseConfig = { databaseURL: "https://cashflow-fa937-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        let myUID = localStorage.getItem('cf_uid_v14_5') || "NODE-" + Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('cf_uid_v14_5', myUID);

        let myMeta = null; let activeRole = 'user'; let activeMap = null; 
        let globalOrderID = localStorage.getItem('cf_tx_14_5') || null;

        function log(m) { document.getElementById('sysLog').innerText = `>> ${m}`; }

        function setupMap() {
            if(activeMap) return;
            activeMap = L.map('map', { zoomControl: false, attributionControl: false }).setView([30.1575, 71.5249], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(activeMap);
        }

        function processQuickGateAuth() {
            const name = document.getElementById('inputAuthName').value;
            if(!name) { alert("Enter Name"); return; }
            myMeta = { name: name, uid: myUID };
            document.getElementById('authStagePanel').classList.add('hidden');
            document.getElementById('roleSelectorStagePanel').classList.remove('hidden');
        }

        function selectCoreRole(role) {
            activeRole = role;
            document.getElementById('roleSelectorStagePanel').classList.add('hidden');
            document.getElementById('mainApplicationAppFrame').classList.remove('hidden');
            setupMap();
            
            document.getElementById('panelUserDashboard').classList.toggle('hidden', role !== 'user');
            document.getElementById('panelAgentDashboard').classList.toggle('hidden', role !== 'agent');
            
            log(`Terminal Connected as: ${role.toUpperCase()}`);
            
            if(globalOrderID) {
                recoverActiveSession();
            } else if(role === 'agent') { 
                startAgentRadarStream(); 
            }
        }

        function triggerUserForm(type) {
            document.getElementById('userHomeMenuLayout').classList.add('hidden');
            document.getElementById('userRequestSetupInputs').classList.remove('hidden');
        }

        // ================= EXACT STRUCTURE WRITING SYNC =================
        function broadcastSignalToNetwork() {
            const amt = document.getElementById('inputAmtValue').value;
            const tip = document.getElementById('inputTipValue').value;
            if(!amt || !tip) { alert("Fill data!"); return; }

            // Matching your exact format: TX-SIGNAL-TIMESTAMP
            globalOrderID = "TX-SIGNAL-" + Date.now();
            localStorage.setItem('cf_tx_14_5', globalOrderID);

            const otp = Math.floor(1000 + Math.random() * 8999);
            const payload = { id: globalOrderID, clientUID: myUID, clientName: myMeta.name, amount: amt, commission: tip, status: "pending", token: otp };

            log("Injecting stream packet to orders/multan...");
            
            // EXACT MATCHING OF YOUR TREE SCREENSHOT
            rtdb.ref('orders/multan/' + globalOrderID).set(payload, (err) => {
                if(err) { log("WRITE ERROR! System Blocked."); } 
                else { 
                    log("SUCCESS! Data Visible on Console Tree.");
                    document.getElementById('userRequestSetupInputs').classList.add('hidden');
                    document.getElementById('userBiddingMonitorRadarRoom').classList.remove('hidden');
                    listenToSignalLifecycle();
                }
            });
        }

        function listenToSignalLifecycle() {
            rtdb.ref('orders/multan/' + globalOrderID).on('value', snap => {
                const data = snap.val();
                if(!data) return;

                if(data.status === 'pending' || data.status === 'countered') {
                    const box = document.getElementById('userLiveIncomingBidsFeed'); box.innerHTML = "";
                    if(data.offers) {
                        Object.keys(data.offers).forEach(k => {
                            const f = data.offers[k];
                            box.innerHTML += `
                                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 flex justify-between items-center">
                                    <div><p class="text-xs font-black text-slate-100">${f.agentName}</p><p class="text-[11px] text-blue-400 font-bold">Offer: PKR ${f.bid}</p></div>
                                    <button onclick="acceptAgentDeal('${f.agentUID}', '${f.bid}')" class="bg-blue-600 text-white font-black text-[10px] px-3 py-1.5 rounded-lg">ACCEPT</button>
                                </div>`;
                        });
                    } else { box.innerHTML = "<p class='text-center text-[10px] text-slate-500 font-bold py-4 animate-pulse'>Broadcasting Signal...</p>"; }
                }
                if(data.status === 'locked') { launchSecureChatRoom(data); }
            });
        }

        function acceptAgentDeal(auid, finalBid) {
            rtdb.ref('orders/multan/' + globalOrderID).update({ status: 'locked', chosenAgent: auid, commission: finalBid });
        }

        function killActiveSignal() {
            if(globalOrderID) rtdb.ref('orders/multan/' + globalOrderID).remove();
            localStorage.removeItem('cf_tx_14_5');
            location.reload();
        }

        // ================= AGENT RADAR READ SYNC =================
        function startAgentRadarStream() {
            log("Agent radar listening to orders/multan...");
            const container = document.getElementById('agentRadarStreamContainer');

            rtdb.ref('orders/multan').on('value', snap => {
                if(activeRole !== 'agent' || globalOrderID) return;
                container.innerHTML = "";
                let signalsFound = false;

                if(snap.exists()) {
                    snap.forEach(child => {
                        const signal = child.val();
                        if(signal && (signal.status === 'pending' || (signal.status === 'countered' && signal.offers && signal.offers[myUID]))) {
                            signalsFound = true;
                            let targetID = signal.id;
                            
                            container.innerHTML = `
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                                    <div class="flex justify-between items-center text-[10px] font-bold text-slate-400"><span>CLIENT: ${signal.clientName}</span></div>
                                    <h2 class="text-2xl font-black text-slate-100">PKR ${signal.amount}</h2>
                                    <p class="text-xs text-slate-400">Commission: <span class="text-blue-500 font-black">PKR ${signal.commission}</span></p>
                                    <div class="flex gap-2"><input id="counterInputPrice" type="number" value="${signal.commission}" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-center font-black text-slate-100 outline-none"><button onclick="sendAgentCounterOffer('${targetID}')" class="bg-blue-600 font-black text-xs text-white px-4 rounded-lg">BID</button></div>
                                </div>`;
                        }
                    });
                }
                if(!signalsFound) { container.innerHTML = "<p class='text-center text-xs text-slate-600 font-bold py-4'>Scanning airspace...</p>"; }
            });

            rtdb.ref('orders/multan').on('child_changed', snap => {
                const updatedData = snap.val();
                if(updatedData && updatedData.status === 'locked' && updatedData.chosenAgent === myUID) {
                    globalOrderID = updatedData.id;
                    localStorage.setItem('cf_tx_14_5', globalOrderID);
                    launchSecureChatRoom(updatedData);
                }
            });
        }

        function sendAgentCounterOffer(targetID) {
            const price = document.getElementById('counterInputPrice').value;
            if(!price) return;
            rtdb.ref('orders/multan/' + targetID + '/offers/' + myUID).set({ agentUID: myUID, agentName: myMeta.name, bid: price });
            rtdb.ref('orders/multan/' + targetID).update({ status: 'countered' });
            document.getElementById('agentRadarStreamContainer').innerHTML = "<p class='text-center text-xs text-blue-400 font-bold animate-pulse py-4'>Proposal Transmitted...</p>";
        }

        // ================= CHAT TERMINAL SUITE =================
        function launchSecureChatRoom(tx) {
            document.getElementById('panelUserDashboard').classList.add('hidden');
            document.getElementById('panelAgentDashboard').classList.add('hidden');
            document.getElementById('secureTransitNodeEndpointTerminal').classList.remove('hidden');

            if(activeRole === 'user') { document.getElementById('otpVal').innerText = tx.token; } 
            else { document.getElementById('otpBox').classList.add('hidden'); document.getElementById('agentOtpBox').classList.remove('hidden'); }

            rtdb.ref('orders/multan/' + globalOrderID + '/chats').on('value', snap => {
                const box = document.getElementById('chatLogger'); box.innerHTML = "";
                if(snap.exists()) {
                    snap.forEach(c => {
                        const m = c.val();
                        const isMe = m.sender === myUID;
                        box.innerHTML += `<div class="p-2 rounded-xl max-w-[80%] ${isMe ? 'bg-blue-600 text-white ml-auto' : 'bg-slate-900 border border-slate-800 text-slate-200'}">${m.msg}</div>`;
                    });
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const val = document.getElementById('chatInput').value; if(!val) return;
            rtdb.ref('orders/multan/' + globalOrderID + '/chats').push({ sender: myUID, msg: val });
            document.getElementById('chatInput').value = "";
        }

        function verifyKeySettle() {
            const key = document.getElementById('agentOtpInput').value;
            rtdb.ref('orders/multan/' + globalOrderID).once('value', snap => {
                if(snap.val() && snap.val().token == key) {
                    log("Pipeline closed successfully!");
                    rtdb.ref('orders/multan/' + globalOrderID).remove();
                    localStorage.removeItem('cf_tx_14_5');
                    setTimeout(() => { location.reload(); }, 1500);
                } else { alert("Token mismatch."); }
            });
        }

        function recoverActiveSession() {
            rtdb.ref('orders/multan/' + globalOrderID).once('value', snap => {
                const data = snap.val();
                if(data) {
                    if(activeRole === 'user') {
                        document.getElementById('userHomeMenuLayout').classList.add('hidden');
                        document.getElementById('userBiddingMonitorRadarRoom').classList.remove('hidden');
                        listenToSignalLifecycle();
                    } else if(activeRole === 'agent' && data.chosenAgent === myUID) {
                        launchSecureChatRoom(data);
                    }
                } else {
                    localStorage.removeItem('cf_tx_14_5');
                    globalOrderID = null;
                    if(activeRole === 'agent') startAgentRadarStream();
                }
            });
        }
    </script>
</body>
</html>
