<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHFLOW GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        .active { display: flex; flex-direction: column; }
        .laser { animation: pulse 1.5s infinite; border: 2px solid #3b82f6; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

    <div id="onboard" class="page active bg-slate-950 items-center justify-center p-8 text-center">
        <h1 class="text-4xl font-black text-blue-500">CASHFLOW</h1>
        <p class="text-gray-400 mt-2">Liquidity Router v1.0</p>
        <button onclick="App.next()" class="mt-8 w-full bg-blue-600 p-4 rounded-xl font-bold">NEXT</button>
    </div>

    <div id="role-select" class="page bg-slate-950 items-center justify-center p-6">
        <h2 class="text-2xl font-bold mb-6">Select Identity</h2>
        <button onclick="App.setRole('user')" class="w-full p-6 bg-slate-900 border border-blue-500 rounded-2xl mb-4">USER TERMINAL</button>
        <button onclick="App.setRole('agent')" class="w-full p-6 bg-slate-900 border border-amber-500 rounded-2xl">AGENT HUB</button>
    </div>

    <div id="dashboard" class="page bg-slate-950">
        <div id="map" class="h-1/2 w-full"></div>
        <div id="ui-panel" class="h-1/2 p-6 flex flex-col justify-between">
            <div id="action-area" class="space-y-4">
                </div>
            <div id="radar-layer" class="hidden text-center">
                <div class="laser w-20 h-20 mx-auto rounded-full"></div>
                <p class="mt-4 font-bold animate-pulse text-blue-400">BROADCASTING...</p>
            </div>
        </div>
    </div>

<script>
const App = {
    role: null,
    step: 0,
    next: () => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('role-select').classList.add('active');
    },
    setRole: (r) => {
        App.role = r;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('dashboard').classList.add('active');
        App.initMap();
    },
    initMap: () => {
        const map = L.map('map', {zoomControl: false}).setView([30.1575, 71.5249], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }
};
</script>
</body>
</html>
