<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow - Ultimate Liquid Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #0b0f19; color: white; font-family: 'Inter', sans-serif; }
        .gradient-card { background: linear-gradient(145deg, #1a2234, #0f172a); border: 1px solid #334155; }
        .radar-pulse { animation: ripple 2s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }
        .btn-blue { background: #3b82f6; transition: 0.3s; }
        .btn-blue:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4">

    <!-- View Controller -->
    <div id="app">
        <!-- Step 1: Role Selection -->
        <div id="view-role" class="space-y-6">
            <h1 class="text-3xl font-bold text-center">CashFlow System</h1>
            <button onclick="setRole('user')" class="w-full p-6 gradient-card rounded-2xl text-left border-l-4 border-blue-500">USER TERMINAL</button>
            <button onclick="setRole('agent')" class="w-full p-6 gradient-card rounded-2xl text-left border-l-4 border-amber-500">AGENT HUB</button>
        </div>

        <!-- Step 2: Verification (Dynamic) -->
        <div id="view-verify" class="hidden space-y-4">
            <h2 id="verify-title" class="text-xl font-bold">Verification Node</h2>
            <input type="text" id="v-name" placeholder="Full Name" class="w-full p-3 bg-slate-800 rounded-lg">
            <input type="text" id="v-cnic" placeholder="CNIC Number (13 digits)" class="w-full p-3 bg-slate-800 rounded-lg">
            <div id="agent-only" class="hidden"><input type="text" placeholder="Vehicle Number" class="w-full p-3 bg-slate-800 rounded-lg"></div>
            <button onclick="startApp()" class="w-full p-4 btn-blue rounded-xl font-bold">INITIALIZE SESSION</button>
        </div>

        <!-- Step 3: Dashboard (Map + Radar) -->
        <div id="view-main" class="hidden h-screen flex flex-col">
            <div id="map" class="h-1/2 rounded-2xl shadow-xl border border-slate-700"></div>
            <div class="flex-1 p-4 space-y-4">
                <div id="radar-ui" class="gradient-card p-6 rounded-3xl text-center">
                    <div id="radar-circle" class="w-20 h-20 bg-blue-500 rounded-full mx-auto mb-4 radar-pulse"></div>
                    <p id="status-text">SYSTEM STANDBY</p>
                    <button id="toggle-btn" onclick="toggleStatus()" class="mt-4 px-6 py-2 bg-slate-700 rounded-full">GO ONLINE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userData = { role: '', status: 'offline' };
        let map = L.map('map').setView([30.1575, 71.5249], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function setRole(r) {
            userData.role = r;
            document.getElementById('view-role').classList.add('hidden');
            document.getElementById('view-verify').classList.remove('hidden');
            if(r === 'agent') document.getElementById('agent-only').classList.remove('hidden');
        }

        function startApp() {
            document.getElementById('view-verify').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
            L.marker([30.1575, 71.5249]).addTo(map).bindPopup("Current Position");
        }

        function toggleStatus() {
            userData.status = userData.status === 'offline' ? 'online' : 'offline';
            document.getElementById('status-text').innerText = userData.status.toUpperCase();
            document.getElementById('radar-circle').style.background = userData.status === 'online' ? '#22c55e' : '#3b82f6';
        }
    </script>
</body>
</html>
